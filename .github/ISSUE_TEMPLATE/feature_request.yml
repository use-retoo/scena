name: Feature request
description: Suggest a new capability or improvement
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What does the current API not let you express?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work? Sketch the API or behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, or other libraries that solve this differently.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I have searched existing issues and discussions for duplicates
          required: true
